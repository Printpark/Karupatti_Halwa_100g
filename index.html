<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Karupatti House</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Segoe UI,Arial,sans-serif;
    background:#f7f7f7;
}

/* Banner */
.shop-banner{
    width:100%;
    text-align:center;
}

.shop-banner img{
    width:100%;
    max-width:500px;
    height:auto;
    display:block;
    margin:auto;
}

/* Card */

.card{
    width:90%;
    max-width:380px;
    background:#fff;
    margin:-25px auto 30px;
    border-radius:20px;
    padding:28px;
    box-shadow:0 8px 25px rgba(0,0,0,.12);
}

/* Heading */

h1{
    text-align:center;
    font-size:32px;
    color:#222;
    margin-bottom:20px;
}

/* Product */

.product{
    text-align:center;
    font-size:24px;
    font-weight:bold;
    color:#2e7d32;
    margin:18px 0 25px;
}

/* Rows */

.row{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap:20px;
    padding:18px 0;
    border-bottom:1px solid #ececec;
}

.label{
    font-size:18px;
    font-weight:bold;
    color:#333;
    flex:1;
}

.value{
    font-size:18px;
    color:#333;
    flex:1;
    text-align:right;
    line-height:1.5;
    word-break:break-word;
}
.price-value{
    color:#2e7d32;
    font-weight:bold;
    font-size:20px;
}

.footer{
    text-align:center;
    margin-top:20px;
    color:#888;
    font-size:14px;
}

</style>

</head>

<body>

<div class="shop-banner">
    <img src="SHOPNAME.jpg" alt="Karupatti House">
</div>

<div class="card">

<h1>Karupatti House</h1>

<div class="row">
    <span class="label">FSSAI No.</span>
    <span class="value">12421026000977</span>
</div>

<div class="product">
    Tirunelveli Halwa
</div>
    
<div class="row">
    <span class="label">Price</span>
    <span class="value price-value">₹50</span>
</div>

<div class="row">
    <span class="label">Quantity</span>
    <span class="value">100g</span>
</div>

<div class="row">
    <span class="label">Validity</span>
    <span class="value">30 Days from MFG Date</span>
</div>

<div class="row">
    <span class="label">Ingredients</span>
    <span class="value">
        Wheat, Ghee, Cashew, Sugar & Refined Oil
    </span>
</div>

</div>

</body>
</html>
